services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: rate-limiter-postgres
    environment:
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter
      POSTGRES_DB: ratelimiter
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./worker/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimiter -d ratelimiter"]
      interval: 5s
      timeout: 3s
      retries: 5

  rate-limiter:
    build:
      context: ./backend/rate-limiter
    container_name: rate-limiter-api
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ratelimiter:ratelimiter@postgres:5432/ratelimiter
      PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    container_name: rate-limiter-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ratelimiter:ratelimiter@postgres:5432/ratelimiter
      STREAM: rl:events
      GROUP: rl-workers
      CONSUMER: worker-1
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      ALERT_REJECTION_THRESHOLD: ${ALERT_REJECTION_THRESHOLD:-0.5}
      ALERT_MIN_VOLUME: ${ALERT_MIN_VOLUME:-20}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-300}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
